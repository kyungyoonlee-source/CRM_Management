<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storyline CRM v6 — 기관 통합 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══ DESIGN SYSTEM ═══ */
:root{
  --bg:#0F1117;--sf:#171B26;--sf2:#1E2333;--sf3:#252B3D;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);
  --tx:#E8EAF0;--tx2:#8B90A0;--tx3:#52576A;
  --ac:#4F8EF7;--ac2:#7B61FF;
  --g:#34C97A;--gb:rgba(52,201,122,.12);
  --am:#F59E0B;--amb:rgba(245,158,11,.12);
  --rd:#F05252;--rdb:rgba(240,82,82,.12);
  --bl:#60A5FA;--blb:rgba(96,165,250,.12);
  --pp:#A78BFA;--ppb:rgba(167,139,250,.12);
  --sw:236px;--th:54px;--r:8px;--rl:12px;--rxl:16px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:13px;color:var(--tx)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sf3);border-radius:4px}

/* LAYOUT */
#app{display:flex;height:100vh;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
/* 수정: 모든 콘텐츠 영역에 스크롤 추가 */
.content{flex:1;overflow-y:auto;padding:22px;scroll-behavior: smooth;}

/* SIDEBAR */
.sidebar{width:var(--sw);background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-brand{padding:20px 18px 16px;border-bottom:1px solid var(--bd)}
.sb-logo{font-size:14px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center;gap:8px}
.sb-logo-ico{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sb-sub{font-size:10px;color:var(--tx3);margin-top:3px;padding-left:36px}
.sb-sec{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);padding:16px 18px 5px}
.sb-nav{padding:2px 8px}
.ni{display:flex;align-items:center;gap:9px;width:100%;padding:8px 11px;border-radius:7px;font-size:13px;color:var(--tx2);transition:all .15s;text-align:left;position:relative}
.ni:hover{background:var(--sf2);color:var(--tx)}
.ni.active{background:rgba(79,142,247,.13);color:var(--ac)}
.ni.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--ac);border-radius:0 3px 3px 0}
.ni svg{width:15px;height:15px;flex-shrink:0;opacity:.65}
.ni.active svg{opacity:1}
.ni-badge{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:9px;background:var(--rdb);color:var(--rd);font-weight:700}
.sb-footer{margin-top:auto;padding:14px 18px;border-top:1px solid var(--bd);font-size:11px;color:var(--tx3);display:flex;align-items:center;gap:8px}
.sb-av{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}

/* TOPBAR */
.topbar{height:var(--th);background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 22px;gap:10px;flex-shrink:0}
.tb-title{font-size:15px;font-weight:600;letter-spacing:-.3px}
.sp{flex:1}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:500;transition:all .15s;cursor:pointer;white-space:nowrap}
.btn-p{background:var(--ac);color:#fff}
.btn-p:hover{background:#3a7ee8;transform:translateY(-1px);box-shadow:0 4px 14px rgba(79,142,247,.35)}
.btn-g{background:var(--sf3);color:var(--tx2);border:1px solid var(--bd2)}
.btn-g:hover{background:var(--sf2);color:var(--tx)}
.btn-d{background:var(--rdb);color:var(--rd);border:1px solid rgba(240,82,82,.25)}
.btn-d:hover{background:rgba(240,82,82,.22)}
.btn-info{background:var(--blb);color:var(--bl);border:1px solid rgba(96,165,250,.25)}
.btn-info:hover{background:rgba(96,165,250,.22)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px}

/* PAGES */
.page{display:none;animation:fi .2s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* STAT CARDS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:18px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s;cursor:default}
.sc.clickable{cursor:pointer}
.sc.clickable:hover{border-color:var(--bd2);transform:translateY(-1px)}
.sc::after{content:'';position:absolute;top:0;right:0;width:52px;height:52px;border-radius:0 var(--rl) 0 52px;opacity:.07}
.sc.c-ac::after{background:var(--ac)}.sc.c-g::after{background:var(--g)}.sc.c-am::after{background:var(--am)}.sc.c-rd::after{background:var(--rd)}.sc.c-pp::after{background:var(--pp)}
.sc-lb{font-size:10px;color:var(--tx3);font-weight:600;margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.sc-v{font-size:26px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.sc-v.c-ac{color:var(--ac)}.sc-v.c-g{color:var(--g)}.sc-v.c-am{color:var(--am)}.sc-v.c-rd{color:var(--rd)}.sc-v.c-pp{color:var(--pp)}
.sc-s{font-size:11px;color:var(--tx3);margin-top:5px;display:flex;align-items:center;gap:4px}
.trend{font-size:10px;padding:1px 5px;border-radius:4px;font-weight:700}
.t-up{background:var(--gb);color:var(--g)}.t-dn{background:var(--rdb);color:var(--rd)}

/* PANELS */
.panel{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);margin-bottom:14px;overflow:hidden}
.ph{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.pt{font-size:13px;font-weight:600}
.pb{padding:18px}
.pb-sm{padding:12px 16px}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:520px}
thead th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bd);background:var(--sf2);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--bd);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s}
tbody tr:hover td{background:var(--sf2)}
.tl{color:var(--ac);cursor:pointer;font-weight:500}
.tl:hover{text-decoration:underline}

/* FILTER BAR */
.fb{padding:10px 14px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--bd);background:var(--sf2)}
.fi,.fs{padding:6px 10px;border:1px solid var(--bd2);border-radius:var(--r);font-size:12px;background:var(--sf3);color:var(--tx);transition:border .15s}
.fi{flex:1;min-width:140px}.fi::placeholder{color:var(--tx3)}
.fi:focus,.fs:focus{outline:none;border-color:var(--ac)}
.fs option{background:var(--sf3)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;white-space:nowrap}
.bg{background:var(--gb);color:var(--g)}.ba{background:var(--amb);color:var(--am)}.br{background:var(--rdb);color:var(--rd)}.bb{background:var(--blb);color:var(--bl)}.bp{background:var(--ppb);color:var(--pp)}.bn{background:var(--sf3);color:var(--tx2)}

/* GRADE PILLS */
.gp{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:11px;font-weight:800;cursor:pointer;transition:transform .1s}
.gp:hover{transform:scale(1.1)}
.gA{background:var(--gb);color:var(--g)}.gB{background:var(--blb);color:var(--bl)}.gC{background:var(--amb);color:var(--am)}.gD{background:var(--rdb);color:var(--rd)}.gN{background:var(--sf3);color:var(--tx3)}

/* PHONE DROPDOWN */
.dir-wrap{position:relative;display:inline-block}
.dir-btn{color:var(--ac);cursor:pointer;font-weight:500;background:none;border:none;font-family:inherit;font-size:13px;padding:0}
.dir-btn:hover{text-decoration:underline}
.dir-drop{position:absolute;top:calc(100%+4px);left:0;background:var(--sf3);border:1px solid var(--bd2);border-radius:var(--rl);padding:10px 13px;z-index:80;min-width:200px;box-shadow:0 6px 20px rgba(0,0,0,.45);display:none}
.dir-drop.show{display:block}
.dir-drop-name{font-size:12px;font-weight:700;color:var(--tx);margin-bottom:6px}
.dir-drop-tel{font-size:13px;color:var(--ac);margin-bottom:8px}
.dir-drop-copy{font-size:11px;padding:4px 10px;border-radius:5px;background:var(--blb);color:var(--bl);border:1px solid rgba(96,165,250,.25);cursor:pointer}
.dir-drop-copy:hover{background:rgba(96,165,250,.22)}

/* MODALS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:flex-start;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.open{opacity:1;pointer-events:all}
.modal{width:min(740px,96vw);height:100vh;background:var(--sf);border-left:1px solid var(--bd2);display:flex;flex-direction:column;transform:translateX(30px);transition:transform .25s cubic-bezier(.16,1,.3,1)}
.ov.open .modal{transform:translateX(0)}
.mhdr{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;gap:10px;flex-shrink:0;background:var(--sf2)}
.minfo{flex:1}
.mname{font-size:16px;font-weight:700;letter-spacing:-.4px}
.msub{font-size:12px;color:var(--tx3);margin-top:2px}
.mcl{width:28px;height:28px;border-radius:var(--r);background:var(--sf3);border:1px solid var(--bd);color:var(--tx2);font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.mcl:hover{background:var(--bd2);color:var(--tx)}
.mtabs{display:flex;background:var(--sf2);border-bottom:1px solid var(--bd);flex-shrink:0;overflow-x:auto}
.mt{padding:10px 14px;font-size:12px;font-weight:500;color:var(--tx3);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;cursor:pointer}
.mt:hover{color:var(--tx)}
.mt.active{color:var(--ac);border-bottom-color:var(--ac)}
.mbody{flex:1;overflow-y:auto;padding:18px 20px}
.tp{display:none}
.tp.active{display:block;animation:fi .2s ease}

/* CENTER MODALS */
.sov{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.sov.open{opacity:1;pointer-events:all}
.sm{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rxl);width:min(620px,96vw);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);transform:scale(.97) translateY(10px);transition:transform .25s cubic-bezier(.16,1,.3,1)}
.sov.open .sm{transform:scale(1) translateY(0)}
.smh{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--sf);z-index:1}
.smt{font-size:15px;font-weight:700}
.smb{padding:18px 20px}
.smf{padding:12px 20px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;background:var(--sf2)}

/* OUTPUT LIST (Cumulative) */
.out-hist-item{background:var(--sf3);border-radius:var(--r);padding:12px;margin-bottom:10px;border:1px solid var(--bd)}
.out-hist-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);margin-bottom:6px}
.out-hist-case{font-size:13px;color:var(--tx);margin-bottom:8px;white-space:pre-wrap}
.file-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--sf2);border:1px solid var(--bd2);border-radius:20px;font-size:11px;color:var(--ac);cursor:pointer}
.file-chip:hover{background:var(--bd2)}

/* TOAST */
#toasts{position:fixed;bottom:20px;right:20px;z-index:1000;display:flex;flex-direction:column;gap:7px}
.toast{padding:11px 16px;border-radius:var(--rl);font-size:13px;font-weight:500;max-width:320px;transform:translateY(12px) scale(.96);opacity:0;transition:all .3s cubic-bezier(.16,1,.3,1);display:flex;align-items:center;gap:7px}
.toast.show{transform:none;opacity:1}
.toast-success{background:rgba(52,201,122,.15);border:1px solid rgba(52,201,122,.3);color:var(--g)}
.toast-error{background:rgba(240,82,82,.15);border:1px solid rgba(240,82,82,.3);color:var(--rd)}

@media(max-width:768px){.sidebar{width:190px}.sg{grid-template-columns:repeat(2,1fr)}}
@media(max-width:540px){.sidebar{display:none}}
</style>
</head>
<body>
<div id="app">

<nav class="sidebar">
  <div class="sb-brand">
    <div class="sb-logo"><div class="sb-logo-ico">📚</div>Storyline CRM</div>
    <div class="sb-sub">기관 통합 관리 시스템 v6</div>
  </div>
  <div class="sb-sec">Overview</div>
  <div class="sb-nav">
    <button class="ni active" onclick="nav('dashboard',this)">
      <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
      대시보드
    </button>
  </div>
  <div class="sb-sec">Management</div>
  <div class="sb-nav">
    <button class="ni" onclick="nav('inst',this)">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1L1 5v1h14V5L8 1zM2 7v5h2V7H2zm4 0v5h2V7H6zm4 0v5h2V7h-2zm4 0v5h2V7h-2zM1 13h14v1.5H1V13z"/></svg>
      기관 관리
    </button>
    <button class="ni" onclick="nav('voc',this)">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 2h14v9H9l-3 3v-3H1V2zm4 3h6v1H5V5zm0 2h4v1H5V7z"/></svg>
      VOC 관리
      <span class="ni-badge" id="voc-pending-badge" style="display:none">0</span>
    </button>
  </div>
  <div class="sb-sec">Reference</div>
  <div class="sb-nav">
    <button class="ni" onclick="nav('strategy',this)">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h12v1H2V2zm0 3h9v1H2V5zm0 3h11v1H2V8zm0 3h7v1H2v-1z"/></svg>
      관리 기관별 구분 및 전략
    </button>
  </div>
</nav>

<div class="main">

<div class="page active" id="page-dashboard">
  <div class="topbar"><span class="tb-title">대시보드</span><div class="sp"></div><span id="dash-date" style="font-size:11px;color:var(--tx3)"></span></div>
  <div class="content">
    <div class="sg" id="dash-stats"></div>
    <div class="panel">
      <div class="ph"><span class="pt">기관 등급 현황</span></div>
      <div class="pb" id="dash-grade-cards"></div>
    </div>
    <div class="panel">
      <div class="ph"><span class="pt">월별 VOC 누적 추이</span></div>
      <div class="pb" id="dash-monthly"></div>
    </div>
  </div>
</div>

<div class="page" id="page-inst">
  <div class="topbar">
    <span class="tb-title">기관 관리</span>
    <div class="sp"></div>
    <button class="btn btn-g btn-sm" onclick="triggerExcel()">📥 엑셀 업로드</button>
    <input type="file" id="excel-input" hidden accept=".csv" onchange="uploadExcel(event)">
    <button class="btn btn-p btn-sm" onclick="openAddInst()">+ 기관 추가</button>
  </div>
  <div class="content">
    <div class="panel">
      <div class="fb">
        <input class="fi" id="fi-q" placeholder="🔍 기관명 검색..." oninput="renderInst()">
        <select class="fs" id="fi-region" onchange="renderInst()"><option value="">전체 지역</option><option>서울</option><option>경기</option><option>인천</option><option>기타</option></select>
        <select class="fs" id="fi-grade" onchange="renderInst()"><option value="">등급 전체</option><option value="A">A 고활용</option><option value="B">B 안정운영</option><option value="C">C 활용지원</option><option value="D">D 집중대응</option></select>
        </div>
      <div class="tw"><table>
        <thead><tr><th>기관명</th><th>등급</th><th>지역</th><th>지사</th><th>담당연구원</th><th>원장</th><th>연차</th><th>교육 횟수</th><th>최근방문</th><th></th></tr></thead>
        <tbody id="inst-tbody"></tbody>
      </table></div>
      <div class="pgr"><span class="pgr-i" id="inst-pi"></span><div class="pgr-b" id="inst-pb"></div></div>
    </div>
  </div>
</div>

</div></div><div class="ov" id="inst-modal">
  <div class="modal">
    <div class="mhdr">
      <div class="minfo"><div class="mname" id="m-name">—</div><div class="msub" id="m-sub">—</div></div>
      <button class="mcl" onclick="closeInstModal()">×</button>
    </div>
    <div class="mtabs">
      <button class="mt active" onclick="switchMT(this,'mt-basic')">기본 정보</button>
      <button class="mt" id="tab-visit-btn" onclick="switchMT(this,'mt-visit')">방문 기록</button>
      <button class="mt" id="tab-edu-btn" onclick="switchMT(this,'mt-edu')">교육</button>
      <button class="mt" onclick="switchMT(this,'mt-output')">Output</button>
    </div>
    <div class="mbody">
      <div class="tp active" id="mt-basic">
        <div class="ig" id="m-basic-grid"></div>
        <div style="background:var(--sf2);padding:13px;border-radius:var(--r)" id="m-feat"></div>
      </div>
      <div class="tp" id="mt-visit">
        <div style="display:flex;justify-content:space-between;margin-bottom:14px">
          <span style="font-weight:600">전체 기록 히스토리 (방문+컨설팅)</span>
          <button class="btn btn-p btn-sm" onclick="openAddVisit()">+ 방문/컨설팅 추가</button>
        </div>
        <div id="m-history-list"></div>
      </div>
      <div class="tp" id="mt-edu">
        <div style="display:flex;justify-content:space-between;margin-bottom:14px">
          <span style="font-weight:600">교육 현황</span>
          <button class="btn btn-p btn-sm" onclick="openAddEdu()">+ 교육 추가</button>
        </div>
        <div id="m-edu-list"></div>
      </div>
      <div class="tp" id="mt-output">
        <div style="display:flex;justify-content:space-between;margin-bottom:14px">
          <span style="font-weight:600">Output 현황</span>
          <button class="btn btn-g btn-sm" onclick="openEditOutput()">✏️ 수정/추가</button>
        </div>
        <div id="m-output-content"></div>
      </div>
    </div>
  </div>
</div>

<div class="sov" id="sov-visit">
  <div class="sm">
    <div class="smh"><span class="smt">방문/컨설팅 기록 추가</span><button class="mcl" onclick="closeSov('sov-visit')">×</button></div>
    <div class="smb">
      <div class="fg2">
        <div class="fg"><label class="fl">일자 *</label><input type="date" class="fin" id="vi-date"></div>
        <div class="fg"><label class="fl">유형</label>
          <select class="fse" id="vi-type">
            <option>교육</option><option>영업</option><option>VOC 대응</option>
            <option value="컨설팅">컨설팅</option><option>기타</option>
          </select>
        </div>
      </div>
      <div class="fg"><label class="fl">내용 *</label><textarea class="fta" id="vi-content" style="min-height:120px"></textarea></div>
    </div>
    <div class="smf"><button class="btn btn-g" onclick="closeSov('sov-visit')">취소</button><button class="btn btn-p" onclick="saveVisit()">저장</button></div>
  </div>
</div>

<div class="sov" id="sov-output">
  <div class="sm">
    <div class="smh"><span class="smt">Output 기록 추가</span><button class="mcl" onclick="closeSov('sov-output')">×</button></div>
    <div class="smb">
      <div class="fg"><label class="fl">입력 날짜</label><input type="date" class="fin" id="out-date"></div>
      <div class="fg"><label class="fl">활용 사례 내용</label><textarea class="fta" id="out-case" style="min-height:80px"></textarea></div>
      <div class="fg">
        <label class="fl">파일 첨부</label>
        <input type="file" id="out-file-input" hidden onchange="handleOutFile(event)">
        <button class="btn btn-g" style="width:100%" onclick="document.getElementById('out-file-input').click()">📁 파일 선택</button>
        <div id="out-file-name" style="font-size:11px;color:var(--ac);margin-top:5px"></div>
      </div>
    </div>
    <div class="smf"><button class="btn btn-g" onclick="closeSov('sov-output')">취소</button><button class="btn btn-p" onclick="saveOutput()">누적 저장</button></div>
  </div>
</div>

<div id="toasts"></div>

<script>
/* ═══ DATA LAYER ═══ */
const KEY='slcrm_v6';
let DB = JSON.parse(localStorage.getItem(KEY)) || {
  seq:1000, insts:[], visits:[], edus:[], consults:[], outputs:[] 
};
function save(){ localStorage.setItem(KEY,JSON.stringify(DB)); }
function uid(){ return 'x'+(DB.seq++)+'_'+Date.now(); }
function today(){ return new Date().toISOString().slice(0,10); }

/* ═══ 2-1: 엑셀(CSV) 업로드 ═══ */
function triggerExcel(){ document.getElementById('excel-input').click(); }
function uploadExcel(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const content = ev.target.result;
    const lines = content.split('\n');
    lines.forEach((line, idx)=>{
      if(idx === 0 || !line.trim()) return; // 헤더 제외
      const cols = line.split(',');
      DB.insts.push({
        id: uid(), name: cols[0], res: cols[1]||'미정', branch: cols[2]||'본사',
        region: cols[3]||'기타', dir: cols[4]||'원장', tel: cols[5]||'',
        yr: parseInt(cols[6])||1, grade: cols[7]||'C', hub:'N'
      });
    });
    save(); renderInst(); toast('데이터가 추가되었습니다.','success');
  };
  reader.readAsText(file, 'EUC-KR');
}

/* ═══ NAVIGATION ═══ */
function nav(p, btn){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.ni').forEach(el=>el.classList.remove('active'));
  if(btn) btn.classList.add('active');
}

/* ═══ 2-3: 기관 렌더링 (교육 횟수 연동) ═══ */
function renderInst(){
  const tbody = document.getElementById('inst-tbody');
  const all = DB.insts; // 필터 로직 생략(기존 V5 유지 권장)
  tbody.innerHTML = all.map(i=>{
    const eduCnt = DB.edus.filter(e=>e.iid === i.id).length; // 교육 횟수 계산
    return `<tr>
      <td><span class="tl" onclick="openModal('${i.id}')">${i.name}</span></td>
      <td><span class="badge bn">${i.grade}</span></td>
      <td>${i.region}</td><td>${i.branch}</td><td>${i.res}</td>
      <td>${i.dir}</td><td>${i.yr}년</td>
      <td><span class="tl" style="font-weight:700" onclick="openModalToTab('${i.id}','edu')">${eduCnt}회</span></td>
      <td>—</td>
      <td><button class="btn btn-xs btn-g" onclick="openModal('${i.id}')">상세</button></td>
    </tr>`;
  }).join('');
}

/* ═══ MODAL CONTROL ═══ */
function openModal(id){
  CUR = id; const i = DB.insts.find(x=>x.id===id); if(!i) return;
  document.getElementById('m-name').textContent = i.name;
  document.getElementById('m-sub').textContent = `${i.region} | ${i.res}`;
  renderHistory(); renderOutput(); renderEdu();
  document.getElementById('inst-modal').classList.add('open');
}
// 2-3 전용: 특정 탭으로 바로 열기
function openModalToTab(id, tab){
  openModal(id);
  const tabBtn = tab==='edu' ? document.getElementById('tab-edu-btn') : document.getElementById('tab-visit-btn');
  tabBtn.click();
}
function closeInstModal(){ document.getElementById('inst-modal').classList.remove('open'); }
function switchMT(btn, id){
  document.querySelectorAll('.mt').forEach(t=>t.classList.remove('active')); btn.classList.add('active');
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active');
}

/* ═══ 2-7: 통합 히스토리 (방문 + 컨설팅) ═══ */
function renderHistory(){
  const vists = DB.visits.filter(v=>v.iid === CUR);
  const consults = DB.consults ? DB.consults.filter(c=>c.iid === CUR) : [];
  // 합치고 날짜순 정렬
  const combined = [...vists, ...consults].sort((a,b)=>b.date.localeCompare(a.date));
  const el = document.getElementById('m-history-list');
  el.innerHTML = combined.map(h=>`
    <div class="tl-item">
      <div class="tl-b">
        <div class="tl-m">
          <span class="badge ${h.type==='컨설팅'?'ba':'bn'}">${h.type}</span>
          <span style="font-size:11px;color:var(--tx3)">${h.date}</span>
        </div>
        <div class="tl-tx">${h.content}</div>
      </div>
    </div>`).join('');
}

/* ═══ 2-5, 2-6: Output 고도화 ═══ */
function renderOutput(){
  const i = DB.insts.find(x=>x.id===CUR);
  const outs = DB.outputs ? DB.outputs.filter(o=>o.iid===CUR) : [];
  const el = document.getElementById('m-output-content');
  
  // 2-5: 카드 이름 변경 반영
  el.innerHTML = `
    <div class="sc" style="margin-bottom:15px; border:1px solid var(--bd2)">
      <div class="sc-lb">데이터 다운로드 수(다운로드 수 / 전체원아)</div>
      <div class="sc-v c-ac">${outs.length}건 기록됨</div>
    </div>
    <div id="output-hist">
      ${outs.map(o=>`
        <div class="out-hist-item">
          <div class="out-hist-meta"><span>📅 ${o.date}</span></div>
          <div class="out-hist-case">${o.content}</div>
          ${o.fileName ? `<div class="file-chip">📁 ${o.fileName}</div>` : ''}
        </div>`).join('')}
    </div>`;
}

let tempFile = null;
function handleOutFile(e){ 
  tempFile = e.target.files[0]; 
  document.getElementById('out-file-name').textContent = tempFile ? tempFile.name : '';
}

function openEditOutput(){
  document.getElementById('out-date').value = today();
  document.getElementById('out-case').value = '';
  tempFile = null; document.getElementById('out-file-name').textContent = '';
  openSov('sov-output');
}

function saveOutput(){
  const date = document.getElementById('out-date').value;
  const content = document.getElementById('out-case').value;
  if(!content) return toast('내용을 입력하세요','error');
  
  if(!DB.outputs) DB.outputs = [];
  DB.outputs.push({
    iid: CUR, date, content, 
    fileName: tempFile ? tempFile.name : null
  });
  save(); closeSov('sov-output'); renderOutput(); toast('기록이 추가되었습니다','success');
}

/* ═══ VISIT (2-7: 유형 이름 변경) ═══ */
function openAddVisit(){ 
  document.getElementById('vi-date').value = today();
  document.getElementById('vi-content').value = '';
  openSov('sov-visit'); 
}
function saveVisit(){
  const d = document.getElementById('vi-date').value;
  const c = document.getElementById('vi-content').value;
  if(!d || !c) return;
  DB.visits.push({ id:uid(), iid:CUR, date:d, type:document.getElementById('vi-type').value, content:c });
  save(); closeSov('sov-visit'); renderHistory(); renderInst();
}

/* 기타 유틸 기능들 유지 */
function openSov(id){ document.getElementById(id).classList.add('open'); }
function closeSov(id){ document.getElementById(id).classList.remove('open'); }
function toast(m,t){
  const e=document.createElement('div'); e.className=`toast toast-${t} show`; e.textContent=m;
  document.getElementById('toasts').appendChild(e);
  setTimeout(()=>{ e.remove(); }, 2000);
}
function renderDash(){
  const now = new Date();
  document.getElementById('dash-date').textContent = now.toLocaleDateString();
  // 대시보드 통계 및 카드 렌더링 로직 (V5 유지)
}

// 초기화
renderDash(); renderInst();
</script>
</body>
</html>
